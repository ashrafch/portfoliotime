# Configurazione Alembic per uso CLI da apps/api/.
# All'avvio dell'app le migrazioni girano via migrations.run_migrations(), che
# sovrascrive sqlalchemy.url con DATABASE_URL dall'ambiente.
#
# Per creare una nuova migrazione (da apps/api, con il DB raggiungibile):
#   alembic revision --autogenerate -m "descrizione"
#   alembic upgrade head

[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = postgresql://portfoliotime:portfoliotime@localhost:5432/portfoliotime

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
